services:
  - type: web
    name: darkscan-ai
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@darkscan.ai
      - key: DB_PATH
        value: /opt/render/project/src/data/darkscan.db
    disk:
      name: darkscan-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
